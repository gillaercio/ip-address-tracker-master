<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | IP Address Tracker</title>

  <link rel="stylesheet" href="./assets/css/index.css">
</head>
<body>

  <header class="header">
    <h1 class="header__title">IP Address Tracker</h1>
    
    <form class="header__search" role="search">
      <label for="ip-input" class="visually-hidden">IP Address</label>
      <input type="text" id="ip-input" class="header__search-input" name="ip" placeholder="Search for any IP address or domain" autocomplete="off"/>
      <button type="submit" class="header__search-button" aria-label="Search IP"></button>
    </form>

    <section class="header__infos" aria-labelledby="info-heading">
      <h2 id="info-heading" class="visually-hidden">IP information</h2>
      <div class="header__info">
        <h3 class="header__info-title">IP Address</h3>
        <p class="header__info-value">192.212.174.101</p>
        <p class="header__info-value"><!-- data --></p>
      </div>

      <div class="header__info">
        <h3 class="header__info-title">Location</h3>
        <p class="header__info-value">Brooklyn, NY 10001</p>
        <p class="header__info-value"><!-- data --></p>
      </div>

      <div class="header__info">
        <h3 class="header__info-title">Timezone</h3>
        <p class="header__info-value">UTC -05:00</p>
        <p class="header__info-value"><!-- UTC add offset value dynamically using the API --></p>
      </div>

      <div class="header__info">
        <h3 class="header__info-title">ISP</h3>
        <p class="header__info-value">SpaceX Starlink</p>
        <p class="header__info-value"><!-- data --></p>
      </div>
    </section>
  </header>

  <main class="main">
    <div id="map" class="main__map"></div>
  </main>

</body>
</html>
